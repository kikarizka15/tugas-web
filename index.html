<!DOCTYPE html>
<html>
<head>
    <title>Determinant Matriks</title>

    <!-- MathJax -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<h1>Penyelesaian Determinan Matriks</h1>

<h2>Diketahui</h2>
<p>
\[
A = \begin{bmatrix}
-7 & -5 \\
1 & 4
\end{bmatrix}
\]
</p>

<h2>Rumus</h2>
<p>
\[
\det(A) = ad - bc
\]
</p>

<h2>Langkah Penyelesaian</h2>
<p>
\[
\det(A) = (-7)(4) - (-5)(1)
\]
</p>

<p>
\[
= -28 - (-5)
\]
</p>

<p>
\[
= -28 + 5
\]
</p>

<p>
\[
= -23
\]
</p>

<h2>Hasil</h2>
<p>
\[
\det(A) = -23
\]
</p>

</body>
</html>
